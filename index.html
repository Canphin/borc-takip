<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taksit & Borç Takip Asistanı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header .emoji {
            font-size: 3em;
            display: block;
            margin-bottom: 10px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card h2 {
            margin-bottom: 15px;
            font-size: 1.2em;
            color: #4fc3f7;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9em;
        }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
        }
        
        input:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            color: white;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 100%;
        }
        
        .btn-save {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            padding: 8px 16px;
            font-size: 0.8em;
        }
        
        .btn-test {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-right: 10px;
        }
        
        .btn-telegram {
            background: linear-gradient(135deg, #0088cc 0%, #006699 100%);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .debt-list {
            list-style: none;
        }
        
        .debt-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #4fc3f7;
        }
        
        .debt-item.urgent {
            border-left-color: #ff416c;
            background: rgba(255,65,108,0.1);
        }
        
        .debt-item.warning {
            border-left-color: #ffa726;
            background: rgba(255,167,38,0.1);
        }
        
        .debt-item.good {
            border-left-color: #66bb6a;
        }
        
        .debt-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .debt-name {
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .debt-details {
            color: #aaa;
            font-size: 0.9em;
        }
        
        .countdown {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .countdown.urgent {
            background: #ff416c;
            color: white;
        }
        
        .countdown.warning {
            background: #ffa726;
            color: #000;
        }
        
        .countdown.good {
            background: #66bb6a;
            color: #000;
        }
        
        .notification-log {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-item {
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            margin-bottom: 5px;
            font-size: 0.8em;
            color: #aaa;
        }
        
        .test-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #4fc3f7;
        }
        
        .stat-label {
            font-size: 0.8em;
            color: #aaa;
            margin-top: 5px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: bold;
        }
        
        .status-badge.saved {
            background: #11998e;
            color: white;
        }
        
        .status-badge.unsaved {
            background: #ffa726;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="emoji">💰</span>
            <h1>Taksit & Borç Takip</h1>
            <p style="color: #aaa;">Telegram Bildirimli Asistan</p>
        </div>

        <!-- İstatistikler -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalDebt">0</div>
                <div class="stat-label">Toplam Borç</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeDebts">0</div>
                <div class="stat-label">Aktif Borç</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayPayments">0</div>
                <div class="stat-label">Bugünkü Ödemeler</div>
            </div>
        </div>

        <!-- Borç Ekleme Formu -->
        <div class="card">
            <h2>📝 Yeni Borç Ekle</h2>
            <div class="form-group">
                <label>Borç Adı</label>
                <input type="text" id="debtName" placeholder="Örn: Araba Kredisi, Kredi Kartı...">
            </div>
            <div class="form-group">
                <label>Toplam Tutar (TL)</label>
                <input type="number" id="debtAmount" placeholder="10000">
            </div>
            <div class="form-group">
                <label>Taksit Sayısı</label>
                <input type="number" id="installments" placeholder="12">
            </div>
            <div class="form-group">
                <label>Aylık Faiz Oranı (%)</label>
                <input type="number" id="interestRate" placeholder="1.5" step="0.1" value="0">
            </div>
            <div class="form-group">
                <label>Son Ödeme Günü</label>
                <input type="date" id="dueDate">
            </div>
            <button class="btn btn-primary" onclick="addDebt()">➕ Borç Ekle</button>
            <button class="btn btn-save" onclick="saveToGitHub()">💾 GitHub'a Kaydet (Bildirimler için)</button>
            
            <div style="margin-top: 10px; text-align: center;">
                <span id="saveStatus" class="status-badge unsaved">⚠️ Kaydedilmemiş</span>
            </div>
        </div>

        <!-- Borç Listesi -->
        <div class="card">
            <h2>📋 Borç Listem</h2>
            <div id="debtList"></div>
            <div id="emptyMessage" style="text-align: center; color: #aaa; padding: 20px;">
                Henüz borç eklenmedi
            </div>
        </div>

        <!-- Bildirim Günlüğü -->
        <div class="card">
            <h2>📜 İşlem Günlüğü</h2>
            <div class="notification-log" id="notificationLog">
                <div class="log-item">Sistem hazır. Borç ekleyip GitHub'a kaydedebilirsiniz.</div>
            </div>
        </div>
    </div>

    <script>
        // GitHub API yapılandırması
        const GITHUB_CONFIG = {
            owner: 'Canphin',
            repo: 'borc-takip',
            path: 'check_debts.js',
            branch: 'main'
        };

        // GitHub Token (sayfa yüklendiğinde sorulacak)
        let githubToken = localStorage.getItem('github_token') || '';

        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', function() {
            if (!githubToken) {
                const token = prompt('GitHub Personal Access Token\'ını gir (bir kereye mahsus):');
                if (token) {
                    githubToken = token;
                    localStorage.setItem('github_token', token);
                    addLog('✅ GitHub token kaydedildi');
                }
            }
            loadDebts();
            updateStats();
        });

        // GitHub'a kaydet
        async function saveToGitHub() {
            if (!githubToken) {
                alert('❌ GitHub token bulunamadı! Sayfayı yenileyip token\'ı gir.');
                return;
            }

            const debts = getDebts();
            
            if (debts.length === 0) {
                alert('⚠️ Kaydedilecek borç yok! Önce borç ekleyin.');
                return;
            }

            addLog('📤 GitHub\'a kaydediliyor...');

            // check_debts.js içeriğini oluştur
            const jsContent = generateJSContent(debts);

            try {
                // Önce mevcut dosyanın SHA'sını al
                const getUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
                
                let sha = '';
                try {
                    const getResponse = await fetch(getUrl, {
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    const getData = await getResponse.json();
                    sha = getData.sha || '';
                } catch (e) {
                    // Dosya yoksa sha boş kalır
                }

                // Dosyayı güncelle
                const updateUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
                
                const body = {
                    message: '🔄 Borç listesi güncellendi',
                    content: btoa(unescape(encodeURIComponent(jsContent))),
                    branch: GITHUB_CONFIG.branch
                };
                
                if (sha) {
                    body.sha = sha;
                }

                const response = await fetch(updateUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    addLog('✅ GitHub başarıyla güncellendi!');
                    document.getElementById('saveStatus').className = 'status-badge saved';
                    document.getElementById('saveStatus').textContent = '✅ Kaydedildi';
                    alert('✅ Başarılı!\n\nBorçlar GitHub\'a kaydedildi.\nGitHub Actions bir sonraki kontrolde yeni borçları algılayıp bildirim gönderecek.');
                } else {
                    addLog('❌ GitHub hatası: ' + (data.message || 'Bilinmeyen hata'));
                    alert('❌ Hata: ' + (data.message || 'Kaydedilemedi'));
                }
            } catch (error) {
                addLog('❌ Bağlantı hatası: ' + error.message);
                alert('❌ Bağlantı hatası: ' + error.message);
            }
        }

        // JS dosyası içeriğini oluştur
        function generateJSContent(debts) {
            const debtsFormatted = debts.map(d => {
                return `  {
    name: "${d.name}",
    monthlyPayment: ${d.monthlyPayment},
    dueDate: "${d.dueDate}"
  }`;
            }).join(',\n');

            return `const TELEGRAM_TOKEN = process.env.TELEGRAM_BOT_TOKEN;
const TELEGRAM_CHAT_ID = process.env.TELEGRAM_CHAT_ID;

const DEBTS = [
${debtsFormatted}
];

async function sendTelegramMessage(message) {
    const url = \`https://api.telegram.org/bot\${TELEGRAM_TOKEN}/sendMessage\`;
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: 'HTML'
            })
        });
        
        const data = await response.json();
        console.log(data.ok ? '✅ Bildirim gönderildi' : '❌ Hata: ' + data.description);
        return data.ok;
    } catch (error) {
        console.log('❌ Bağlantı hatası:', error.message);
        return false;
    }
}

async function checkAllDebts() {
    console.log('🔍 Borçlar kontrol ediliyor...');
    console.log('📅 Tarih:', new Date().toLocaleString('tr-TR', { timeZone: 'Europe/Istanbul' }));
    
    if (DEBTS.length === 0) {
        console.log('⚠️ Henüz borç eklenmemiş.');
        return;
    }
    
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    let notificationSent = false;
    
    for (const debt of DEBTS) {
        const dueDate = new Date(debt.dueDate);
        dueDate.setHours(0, 0, 0, 0);
        
        const daysUntilDue = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
        
        console.log(\`📋 \${debt.name}: \${daysUntilDue} gün (Vade: \${debt.dueDate})\`);
        
        let message = '';
        let shouldNotify = false;
        
        if (daysUntilDue === 0) {
            message = \`💰 <b>BUGÜN ÖDEME GÜNÜ!</b>\\n\\nBorç: \${debt.name}\\nTutar: \${debt.monthlyPayment.toLocaleString('tr-TR')} TL\\n\\n🔴 Hemen ödeme yapmayı unutma!\`;
            shouldNotify = true;
        } else if (daysUntilDue === 1) {
            message = \`🔴 <b>YARIN SON GÜN!</b>\\n\\nBorç: \${debt.name}\\nTutar: \${debt.monthlyPayment.toLocaleString('tr-TR')} TL\\nSon Ödeme: \${dueDate.toLocaleDateString('tr-TR')}\\n\\n⚠️ Ödemeyi hazırla!\`;
            shouldNotify = true;
        } else if (daysUntilDue === 3) {
            message = \`🔶 <b>3 GÜN KALDI</b>\\n\\nBorç: \${debt.name}\\nTutar: \${debt.monthlyPayment.toLocaleString('tr-TR')} TL\\nSon Ödeme: \${dueDate.toLocaleDateString('tr-TR')}\\n\\n💡 Hazırlık yapmaya başla!\`;
            shouldNotify = true;
        } else if (daysUntilDue === 7) {
            message = \`⚠️ <b>1 HAFTA KALDI</b>\\n\\nBorç: \${debt.name}\\nTutar: \${debt.monthlyPayment.toLocaleString('tr-TR')} TL\\nSon Ödeme: \${dueDate.toLocaleDateString('tr-TR')}\\n\\n📅 Bütçeni ayarla.\`;
            shouldNotify = true;
        } else if (daysUntilDue < 0) {
            message = \`❌ <b>GECİKTİN!</b>\\n\\nBorç: \${debt.name}\\nTutar: \${debt.monthlyPayment.toLocaleString('tr-TR')} TL\\nGecikme: \${Math.abs(daysUntilDue)} gün\\n\\n🚨 Acil ödeme yap!\`;
            shouldNotify = true;
        }
        
        if (shouldNotify) {
            console.log(\`📤 Bildirim gönderiliyor: \${debt.name} (\${daysUntilDue} gün)\`);
            const success = await sendTelegramMessage(message);
            if (success) {
                notificationSent = true;
                console.log('✅ Gönderildi!');
            } else {
                console.log('❌ Gönderilemedi!');
            }
            await new Promise(resolve => setTimeout(resolve, 1000));
        }
    }
    
    if (!notificationSent) {
        console.log('✅ Yaklaşan ödeme yok, bildirim gönderilmedi.');
    }
    
    console.log('✅ Kontrol tamamlandı.');
}

checkAllDebts();`;
        }

        // Borç ekle
        function addDebt() {
            const name = document.getElementById('debtName').value;
            const totalAmount = parseFloat(document.getElementById('debtAmount').value);
            const installments = parseInt(document.getElementById('installments').value);
            const interestRate = parseFloat(document.getElementById('interestRate').value) || 0;
            const dueDate = document.getElementById('dueDate').value;
            
            if (!name || !totalAmount || !installments || !dueDate) {
                alert('Lütfen tüm alanları doldurun!');
                return;
            }
            
            const monthlyInterest = interestRate / 100;
            const totalWithInterest = totalAmount * (1 + monthlyInterest * installments);
            const monthlyPayment = totalWithInterest / installments;
            
            const debt = {
                id: Date.now(),
                name,
                totalAmount,
                installments,
                interestRate,
                monthlyPayment: Math.round(monthlyPayment * 100) / 100,
                dueDate,
                createdAt: new Date().toISOString()
            };
            
            let debts = getDebts();
            debts.push(debt);
            saveDebts(debts);
            
            document.getElementById('debtName').value = '';
            document.getElementById('debtAmount').value = '';
            document.getElementById('installments').value = '';
            document.getElementById('interestRate').value = '0';
            document.getElementById('dueDate').value = '';
            
            loadDebts();
            updateStats();
            addLog('✅ Yeni borç eklendi: ' + name);
            document.getElementById('saveStatus').className = 'status-badge unsaved';
            document.getElementById('saveStatus').textContent = '⚠️ Kaydedilmedi (GitHub\'a kaydet)';
        }

        // Borç sil
        function deleteDebt(id) {
            if (confirm('Bu borcu silmek istediğine emin misin?')) {
                let debts = getDebts();
                debts = debts.filter(d => d.id !== id);
                saveDebts(debts);
                loadDebts();
                updateStats();
                addLog('🗑️ Borç silindi');
                document.getElementById('saveStatus').className = 'status-badge unsaved';
                document.getElementById('saveStatus').textContent = '⚠️ Kaydedilmedi (GitHub\'a kaydet)';
            }
        }

        // localStorage işlemleri
        function getDebts() {
            return JSON.parse(localStorage.getItem('debts_data') || '[]');
        }

        function saveDebts(debts) {
            localStorage.setItem('debts_data', JSON.stringify(debts));
        }

        // Borç listesini yükle
        function loadDebts() {
            const debts = getDebts();
            const debtList = document.getElementById('debtList');
            const emptyMessage = document.getElementById('emptyMessage');
            
            if (debts.length === 0) {
                debtList.innerHTML = '';
                emptyMessage.style.display = 'block';
                return;
            }
            
            emptyMessage.style.display = 'none';
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            debtList.innerHTML = debts.map(debt => {
                const dueDate = new Date(debt.dueDate);
                dueDate.setHours(0, 0, 0, 0);
                const daysUntilDue = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
                
                let status = 'good';
                let countdownText = '';
                let countdownClass = '';
                
                if (daysUntilDue < 0) {
                    status = 'urgent';
                    countdownText = `${Math.abs(daysUntilDue)} gün gecikti!`;
                    countdownClass = 'urgent';
                } else if (daysUntilDue === 0) {
                    status = 'urgent';
                    countdownText = 'BUGÜN!';
                    countdownClass = 'urgent';
                } else if (daysUntilDue <= 3) {
                    status = 'warning';
                    countdownText = `${daysUntilDue} gün kaldı`;
                    countdownClass = 'warning';
                } else if (daysUntilDue <= 7) {
                    status = 'warning';
                    countdownText = `${daysUntilDue} gün kaldı`;
                    countdownClass = 'warning';
                } else {
                    countdownText = `${daysUntilDue} gün var`;
                    countdownClass = 'good';
                }
                
                return `
                    <div class="debt-item ${status}">
                        <div class="debt-info">
                            <div>
                                <div class="debt-name">${debt.name}</div>
                                <div class="debt-details">
                                    Aylık: ${debt.monthlyPayment.toLocaleString('tr-TR')} TL | 
                                    Toplam: ${debt.totalAmount.toLocaleString('tr-TR')} TL | 
                                    Taksit: ${debt.installments}
                                </div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span class="countdown ${countdownClass}">${countdownText}</span>
                                <button class="btn btn-danger" onclick="deleteDebt(${debt.id})">🗑️</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // İstatistikleri güncelle
        function updateStats() {
            const debts = getDebts();
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const totalDebt = debts.reduce((sum, d) => sum + d.totalAmount, 0);
            const activeDebts = debts.length;
            
            const todayPayments = debts.filter(d => {
                const dueDate = new Date(d.dueDate);
                dueDate.setHours(0, 0, 0, 0);
                return dueDate.getTime() === today.getTime();
            }).length;
            
            document.getElementById('totalDebt').textContent = totalDebt.toLocaleString('tr-TR') + ' ₺';
            document.getElementById('activeDebts').textContent = activeDebts;
            document.getElementById('todayPayments').textContent = todayPayments;
        }

        // Log ekle
        function addLog(message) {
            const logContainer = document.getElementById('notificationLog');
            const time = new Date().toLocaleTimeString('tr-TR');
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.textContent = `[${time}] ${message}`;
            logContainer.insertBefore(logItem, logContainer.firstChild);
            
            if (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }
    </script>
</body>
</html>
